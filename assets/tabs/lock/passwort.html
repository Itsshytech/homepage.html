<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privater Bereich</title>
    <style>
        :root {
            color: white;
            background-color: rgb(24, 22, 22);
        }

        /* Grundlegendes Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Zentriert die Login-Box auf dem Bildschirm */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }

        /* Styling für die Login-Box */
        .login-container {
            background-color: #111111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid rgb(41, 41, 41);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
        }

        .login-container input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #232323;
            border: 1px solid rgb(50, 50, 50);
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-container input[type="password"]:focus {
            outline: none;
            border-color: #4b4b4b;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #232323;
            color: #ffffff;
            border: 1px solid rgb(60, 60, 60);
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-container button:hover {
            background-color: #4b4b4b;
        }

        /* Fehlermeldung */
        .error-message {
            color: #ff4a4a;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        /* Container für den geheimen Inhalt */
        #inhaltBereich {
            display: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="loginBereich" class="login-wrapper">
        <div class="login-container">
            <h2>Privater Bereich</h2>
            <form id="loginForm">
                <input type="password" id="pwFeld" placeholder="Passwort Hier eingeben" required>
                <button type="submit">Einloggen</button>
            </form>
            <p id="fehler" class="error-message">Falsches Passwort!</p>
        </div>
    </div>

    <div id="inhaltBereich"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Verhindert das Neuladen der Seite
            
            var eingabe = document.getElementById('pwFeld').value;
            var fehlerMeldung = document.getElementById('fehler');

            if (eingabe === "0x2441563634_soos_was_here_dot_com") {
                // Holt den Inhalt von haupt.html aus deinem Ordnerstruktur
                alert("WARNUNG SEITE KANN JUMPSCARES HABEN NIEMALS DAS WORT dorito EINGEBEN")
                window.location.replace("https://thisisnotawebsitedotcom.com/")
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Datei konnte nicht geladen werden.');
                        }
                        return response.text();
                    })
                    .then(htmlInhalt => {
                        // Login-Box komplett ausblenden
                        document.getElementById('loginBereich').style.display = 'none';
                        
                        // Inhalt der haupt.html einfügen und anzeigen
                        var inhaltDiv = document.getElementById('inhaltBereich');
                        inhaltDiv.innerHTML = htmlInhalt;
                        inhaltDiv.style.display = 'block';
                    })
                    .catch(error => {
                        alert("Fehler beim Laden der Seite: " + error.message);
                    });
            } else {
                // Passwort falsch -> Fehler anzeigen
                fehlerMeldung.style.display = 'block';
            }
        });
    </script>

</body>
</html>
